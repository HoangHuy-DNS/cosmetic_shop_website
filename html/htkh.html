<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>MPO Support</title>

<link rel="stylesheet" href="../css/htkh.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header>

<button class="back-btn" onclick="history.back()">
<i class="fa fa-arrow-left"></i> Home
</button>

<div class="logo">MPO.VN</div>

<div class="menu">
<a href="#">Gửi yêu cầu</a>
<a href="#">Đăng nhập</a>
</div>

</header>


<section class="hero">

<h1>Xin chào! Chúng tôi có thể giúp gì cho bạn?</h1>

<div class="search-box">
<input type="text" placeholder="Nhập từ khóa để tìm sản phẩm...">
<button><i class="fa fa-search"></i></button>
</div>

<div class="contact">

<span>
<i class="fa fa-phone"></i> 1800 6324
</span>

<span onclick="openChat()">
<i class="fa fa-comment"></i> Chat
</span>

</div>

</section>


<section class="services">

<div class="service">
<i class="fa fa-user"></i>
<p>Tài khoản</p>
</div>

<div class="service">
<i class="fa fa-bag-shopping"></i>
<p>Đặt hàng</p>
</div>

<div class="service">
<i class="fa fa-box"></i>
<p>Quy cách đóng gói</p>
</div>

<div class="service">
<i class="fa fa-truck"></i>
<p>Vận chuyển 2H</p>
</div>

<div class="service">
<i class="fa fa-money-bill"></i>
<p>Phí vận chuyển</p>
</div>

<div class="service">
<i class="fa fa-shield"></i>
<p>Bảo hành</p>
</div>

<div class="service">
<i class="fa fa-rotate"></i>
<p>Đổi trả</p>
</div>

<div class="service">
<i class="fa fa-spa"></i>
<p>Dịch vụ SPA</p>
</div>

</section>


<section class="faq">



<div class="faq-list">



</div>

</section>


<!-- CHAT BOX -->

<div class="chat-popup" id="chatBox">

<div class="chat-header">
<span>Hỗ trợ khách hàng</span>
<button onclick="closeChat()">✖</button>
</div>

<div class="chat-body" id="chatBody"></div>

<div class="chat-input">
<input type="text" id="userInput" placeholder="Nhập tin nhắn...">
<button onclick="sendMessage()">Gửi</button>
</div>

</div>

<script src="../js/htkh.js"></script>

</body>
</html>
