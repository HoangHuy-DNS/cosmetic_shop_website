<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thanh toán</title>
    <link rel="stylesheet" href="../css/checkout.css" />
  </head>

  <body>
    <div class="container">
      <h1>Thông tin thanh toán</h1>

      <div class="form">

        <button onclick="order()">Xác nhận đặt hàng</button>
      </div>
    </div>

    <script src="../js/checkout.js"></script>
  </body>
</html>
